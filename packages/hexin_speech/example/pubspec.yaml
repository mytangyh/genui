name: hexin_speech_example
description: Example app for hexin_speech package
publish_to: none

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hexin_speech:
    path: ../
  logging: ^1.2.0
  file_picker: ^8.0.0
  path_provider: ^2.1.0

dependency_overrides:
  record_platform_interface: 1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
